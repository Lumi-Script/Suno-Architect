      <div class="container">
        <section id="home">
          <div class="logo">Suno Architect</div>
          <p class="subtitle">The Professional Prompt Engineering Suite for AI Music</p>
          <h1>Transform Your Musical Vision into Reality</h1>
          <p><strong>Suno Architect</strong> is a specialized AI-powered workstation designed to bridge the gap between creative ideas and high-quality AI music generation. By leveraging Google's advanced Gemini Large Language Models, our app automates the complex process of prompt engineering for platforms like Suno and Udio.</p>
          
          <div class="card">
            <h3>Key Purpose & Features</h3>
            <ul>
              <li><strong>Intelligent Album Structuring:</strong> Automatically organize a single concept into a cohesive multi-track album (up to 7 tracks) with consistent themes and progression.</li>
              <li><strong>Advanced Prompt Engineering:</strong> Generate highly detailed meta-tags, style descriptors, and production directives that AI music engines understand, ensuring your output matches your creative intent.</li>
              <li><strong>Lyrical Composition:</strong> Create emotive, rhythmically aware lyrics that are optimized for AI vocal synthesis.</li>
              <li><strong>Seamless Workflow:</strong> Sync your generated prompts directly to your Suno account, eliminating manual copy-pasting and accelerating your creative process.</li>
            </ul>
          </div>

          <div class="card">
            <h3>How It Works</h3>
            <p>Simply describe your musical idea—whether it's a mood, a story, or a specific genre blend. Suno Architect uses specialized system instructions to "architect" a complete technical specification for your song, including BPM, key signatures, and structural tags like [Verse], [Chorus], and [Bridge].</p>
          </div>

          <div class="card" style="border-color: #a855f7/50; background: linear-gradient(to bottom right, #1e293b, #0f172a);">
            <h3>JavaScript Required for Interactive Tools</h3>
            <p>While this preview provides information about our service, the <strong>interactive prompt generator, history explorer, and visualizer tools</strong> require JavaScript. Please enable JavaScript in your browser settings to access the full Suno Architect suite.</p>
          </div>
        </section>

        <section id="about">
          <h2>About Suno Architect</h2>
          <p><strong>Suno Architect</strong> is an advanced creative tool designed to help construct highly detailed structural templates, lyrics, and metadata for AI music generation platforms like Suno and Udio.</p>
          <div class="card">
            <h3>Data Usage Transparency</h3>
            <ul>
              <li><strong>Google OAuth & Data Request:</strong> We offer a "Sign in with Google" feature that requests access for the Gemini API scopes. We specifically request this to communicate with Google's Gemini LLMs to write and expand lyrical prompts on your behalf completely free of charge. We do not use this access for any other reasons, and do not access files, emails, or personal information.</li>
              <li><strong>Local Processing First:</strong> When you provide a Google Auth token or an API key, we utilize it only to relay prompts transiently to the generative API.</li>
              <li><strong>Visibility:</strong> No sign in is strictly required to view the application and its features. However, to generate the intricate LLM prompt layouts, an API token or a Google Sign In allows the app to communicate effectively.</li>
            </ul>
          </div>
        </section>

        <section id="privacy">
          <h2>Privacy Policy</h2>
          <p>We are committed to protecting your privacy. This application is designed with a strict minimal-data philosophy.</p>
          <div class="card">
            <ul>
              <li><strong>No Sensitive Data Lasts:</strong> Gemini / Google auth data directly interfaces with the Gemini API. Suno tokens reach our Cloudflare deployment, though are not logged and are extremely time limited.</li>
              <li><strong>No Identifying Info:</strong> No private identifying information ever reaches our servers, including your personal identifying Google and Suno information.</li>
              <li><strong>Usage of Data:</strong> No telemetry data is recorded by us beyond URL request logs. Please consult Gemini's privacy policy for how they handle data.</li>
            </ul>
          </div>
        </section>
