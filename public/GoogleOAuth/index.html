<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Logging in...</title>
  </head>
  <body style="background-color:#0f172a;color:white;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-family:sans-serif;">
    <div id="status">Logging you in, please wait...</div>
    <script>
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      const accessToken = params.get('access_token');
      
      if (accessToken) {
        localStorage.setItem('google_access_token', accessToken);
        window.location.href = '/';
      } else {
        document.getElementById('status').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;flex-direction:column;"><p>Authentication failed or no token found.</p><button onclick="window.location.href=\'/\'" style="margin-top:16px;padding:8px 16px;background-color:#2563eb;color:white;border:none;border-radius:4px;cursor:pointer;">Go Back</button></div>';
      }
    </script>
  </body>
</html>
